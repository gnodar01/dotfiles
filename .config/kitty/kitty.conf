###### Theme ######
include dracula.conf

###### Font Config ######
# Setup Meslo
font_family      family="MesloLGS Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# Generic Font config
font_size        13.0

##### Cursor ######
cursor_shape beam
cursor_shape_unfocused hollow
cursor_blink_interval 0

##### kitty-scrollback.nvim ######
allow_remote_control socket-only
#listen_on unix:/var/folders/_h/pstxjwl508x7kqfk_cr8cf740000gq/T/kitty
listen_on unix:${TMPDIR}/kitty
shell_integration enabled

## ❯ nvim --headless +'KittyScrollbackGenerateKittens'
# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '${HOME}/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
# :help startup-options
#   --clean Mimica a fresh nvim install
#   --noplugin skip loading plugins
#   -n no swap-file
map kitty_mod+h kitty_scrollback_nvim --nvim-args --noplugin -n
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output --nvim-args --noplugin -n
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
##

###### Other ######
enable_audio_bell no
confirm_os_window_close 0
cursor_trail 1

editor nvim
